{{define "content"}}
<div class="flex justify-center items-center min-h-[calc(100vh-200px)]">
    <div class="w-full max-w-lg">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden text-center">
            <div class="bg-success text-white py-4">
                <h3 class="text-xl font-bold">
                    <i class="bi bi-check-circle-fill mr-2"></i> {{.Title}}
                </h3>
            </div>
            <div class="p-8">
                <!-- Icono de éxito -->
                <div class="text-7xl text-success mb-4">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                
                <h2 class="text-2xl font-bold text-gray-800 mb-3">¡Operación Exitosa!</h2>
                
                <p class="text-gray-500 mb-6">
                    {{.Message | default "La operación se ha completado correctamente."}}
                </p>
                
                <div class="flex justify-center gap-3 mt-4">
                    <a href="/dashboard" class="btn-primary">
                        <i class="bi bi-speedometer2"></i> Ir al Dashboard
                    </a>
                    <a href="javascript:history.back()" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-lg transition">
                        <i class="bi bi-arrow-left"></i> Continuar
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
