{{define "content"}}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="bi {{if .Perfil.ID}}bi-pencil-square{{else}}bi-plus-circle{{end}}"></i> 
                    {{.Title}}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/seguridad/perfiles/{{if .Perfil.ID}}actualizar/{{.Perfil.ID}}{{else}}crear{{end}}" id="perfilForm">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre del Perfil <span class="text-danger">*</span></label>
                        <input type="text" name="nombre" class="form-control" 
                               value="{{.Perfil.Nombre}}" required minlength="3" maxlength="50"
                               placeholder="Ej: Administrador, Usuario, Editor">
                        <div class="form-text">Nombre único del perfil (3-50 caracteres)</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="4" 
                                  placeholder="Descripción del perfil y sus responsabilidades...">{{.Perfil.Descripcion}}</textarea>
                    </div>
                    
                    {{if eq .Perfil.ID 1}}
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> El perfil de Administrador no se puede eliminar, pero puedes editar su descripción.
                    </div>
                    {{end}}
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/seguridad/perfiles" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script>
document.getElementById('perfilForm').addEventListener('submit', function(e) {
    const nombre = document.querySelector('[name="nombre"]').value.trim();
    if (nombre.length < 3) {
        e.preventDefault();
        Swal.fire('Error', 'El nombre debe tener al menos 3 caracteres', 'error');
    }
});
</script>
{{end}}
