{{define "content"}}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">
        <i class="bi bi-shield-lock mr-2"></i> {{.Title}}
    </h2>
    <hr class="border-gray-200 my-2">
</div>

<div class="flex flex-col md:flex-row gap-6">
    <!-- Columna izquierda - Selector de perfil -->
    <div class="w-full md:w-1/3">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-primary-600 text-white px-4 py-3">
                <h5 class="font-semibold"><i class="bi bi-person-badge mr-2"></i> Seleccionar Perfil</h5>
            </div>
            <div class="p-4">
                <select class="form-select w-full" id="perfilSelect">
                    <option value="">-- Seleccione un perfil --</option>
                    {{range .Perfiles}}
                    <option value="{{.ID}}">{{.Nombre}}</option>
                    {{end}}
                </select>
                <button class="btn-primary w-full mt-3" id="btnCargar">
                    <i class="bi bi-cloud-download"></i> Cargar Permisos
                </button>
            </div>
        </div>
    </div>
    
    <!-- Columna derecha - Tabla de permisos -->
    <div class="w-full md:w-2/3">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-success text-white px-4 py-3">
                <h5 class="font-semibold"><i class="bi bi-table mr-2"></i> Permisos del Perfil</h5>
            </div>
            <div class="p-4" id="permisosContainer">
                <div class="bg-blue-50 border-l-4 border-info text-blue-800 p-4 rounded text-center">
                    <i class="bi bi-info-circle mr-2"></i> 
                    Seleccione un perfil y presione "Cargar Permisos"
                </div>
            </div>
            <div class="bg-gray-50 px-4 py-3 border-t border-gray-200 text-right" id="btnGuardarContainer" style="display: none;">
                <button class="btn-success" id="btnGuardar">
                    <i class="bi bi-save"></i> Guardar Cambios
                </button>
            </div>
        </div>
    </div>
</div>

<input type="hidden" name="csrf_token" id="csrfToken" value="{{.CSRFToken}}">
{{end}}

{{define "scripts"}}
<script>
let currentPerfilID = 0;
let currentPermisos = [];

document.getElementById('btnCargar').addEventListener('click', function() {
    const perfilID = document.getElementById('perfilSelect').value;
    if (!perfilID) {
        Swal.fire('Atención', 'Seleccione un perfil primero', 'warning');
        return;
    }
    
    currentPerfilID = parseInt(perfilID);
    
    Swal.fire({
        title: 'Cargando...',
        text: 'Obteniendo permisos del perfil',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
    });
    
    fetch('/seguridad/permisos-perfil/cargar', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRF-Token': document.getElementById('csrfToken').value
        },
        body: 'perfil_id=' + perfilID
    })
    .then(response => response.json())
    .then(data => {
        Swal.close();
        if (data.error) {
            Swal.fire('Error', data.error, 'error');
        } else {
            renderPermisos(data.data.permisos);
            document.getElementById('btnGuardarContainer').style.display = 'block';
        }
    })
    .catch(error => {
        Swal.close();
        Swal.fire('Error', 'Error al cargar permisos', 'error');
    });
});

function renderPermisos(permisos) {
    currentPermisos = permisos;
    const container = document.getElementById('permisosContainer');
    
    let html = `
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-primary-600">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-white uppercase tracking-wider">Módulo</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-white uppercase tracking-wider w-16">Ver</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-white uppercase tracking-wider w-16">Crear</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-white uppercase tracking-wider w-16">Editar</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-white uppercase tracking-wider w-16">Eliminar</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-white uppercase tracking-wider w-16">Detalle</th>
                        <th class="px-4 py-3 text-center text-xs font-medium text-white uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
    `;
    
    permisos.forEach((permiso, index) => {
        html += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-4 py-3">
                            <strong class="text-gray-800">${escapeHtml(permiso.modulo.nombre_mostrar)}</strong><br>
                            <span class="text-xs text-gray-400">${escapeHtml(permiso.modulo.nombre)}</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <input type="checkbox" class="w-4 h-4 text-primary-600 rounded focus:ring-primary-500 permiso-check" 
                                   data-index="${index}" data-permiso="ver" 
                                   ${permiso.puede_ver ? 'checked' : ''}>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <input type="checkbox" class="w-4 h-4 text-primary-600 rounded focus:ring-primary-500 permiso-check" 
                                   data-index="${index}" data-permiso="crear" 
                                   ${permiso.puede_crear ? 'checked' : ''}>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <input type="checkbox" class="w-4 h-4 text-primary-600 rounded focus:ring-primary-500 permiso-check" 
                                   data-index="${index}" data-permiso="editar" 
                                   ${permiso.puede_editar ? 'checked' : ''}>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <input type="checkbox" class="w-4 h-4 text-primary-600 rounded focus:ring-primary-500 permiso-check" 
                                   data-index="${index}" data-permiso="eliminar" 
                                   ${permiso.puede_eliminar ? 'checked' : ''}>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <input type="checkbox" class="w-4 h-4 text-primary-600 rounded focus:ring-primary-500 permiso-check" 
                                   data-index="${index}" data-permiso="detalle" 
                                   ${permiso.puede_detalle ? 'checked' : ''}>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <div class="flex gap-1 justify-center">
                                <button class="bg-primary-500 hover:bg-primary-600 text-white text-xs font-semibold py-1 px-2 rounded transition" onclick="seleccionarTodo(${index})">
                                    <i class="bi bi-check-all"></i> Todo
                                </button>
                                <button class="bg-gray-500 hover:bg-gray-600 text-white text-xs font-semibold py-1 px-2 rounded transition" onclick="seleccionarNada(${index})">
                                    <i class="bi bi-x"></i> Nada
                                </button>
                            </div>
                        </td>
                    </tr>
        `;
    });
    
    html += `
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = html;
    
    // Agregar event listeners a los checkboxes
    document.querySelectorAll('.permiso-check').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const index = parseInt(this.dataset.index);
            const permiso = this.dataset.permiso;
            currentPermisos[index][`puede_${permiso}`] = this.checked;
        });
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function seleccionarTodo(index) {
    currentPermisos[index].puede_ver = true;
    currentPermisos[index].puede_crear = true;
    currentPermisos[index].puede_editar = true;
    currentPermisos[index].puede_eliminar = true;
    currentPermisos[index].puede_detalle = true;
    
    const row = document.querySelectorAll('tbody tr')[index];
    row.querySelectorAll('.permiso-check').forEach(cb => {
        cb.checked = true;
    });
}

function seleccionarNada(index) {
    currentPermisos[index].puede_ver = false;
    currentPermisos[index].puede_crear = false;
    currentPermisos[index].puede_editar = false;
    currentPermisos[index].puede_eliminar = false;
    currentPermisos[index].puede_detalle = false;
    
    const row = document.querySelectorAll('tbody tr')[index];
    row.querySelectorAll('.permiso-check').forEach(cb => {
        cb.checked = false;
    });
}

document.getElementById('btnGuardar').addEventListener('click', function() {
    const permisosToSend = currentPermisos.map(p => ({
        modulo_id: p.modulo.id,
        puede_ver: p.puede_ver,
        puede_crear: p.puede_crear,
        puede_editar: p.puede_editar,
        puede_eliminar: p.puede_eliminar,
        puede_detalle: p.puede_detalle
    }));
    
    Swal.fire({
        title: 'Guardando...',
        text: 'Actualizando permisos',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
    });
    
    fetch('/seguridad/permisos-perfil/guardar', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': document.getElementById('csrfToken').value
        },
        body: JSON.stringify({
            perfil_id: currentPerfilID,
            permisos: permisosToSend
        })
    })
    .then(response => response.json())
    .then(data => {
        Swal.close();
        if (data.error) {
            Swal.fire('Error', data.error, 'error');
        } else {
            Swal.fire('Éxito', 'Permisos guardados correctamente', 'success');
        }
    })
    .catch(error => {
        Swal.close();
        Swal.fire('Error', 'Error al guardar permisos', 'error');
    });
});
</script>
{{end}}
