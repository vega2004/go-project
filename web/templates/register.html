{{define "content"}}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Registro de Usuario</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/do-register" id="registerForm">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" name="name" class="form-control" required minlength="2">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" name="phone" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required minlength="6">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Confirmar Contraseña</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <div class="g-recaptcha" data-sitekey="{{.RecaptchaKey}}"></div>
                        <input type="hidden" name="recaptchaToken" id="recaptchaToken">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle"></i> Registrarse
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="/login" class="text-muted">¿Ya tienes cuenta? Inicia sesión</a>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = document.querySelector('[name="password"]').value;
        const confirm = document.querySelector('[name="confirm_password"]').value;
        
        if (password !== confirm) {
            e.preventDefault();
            alert('Las contraseñas no coinciden');
            return;
        }
        
        const token = grecaptcha.getResponse();
        if (!token) {
            e.preventDefault();
            alert('Por favor, completa el reCAPTCHA');
            return;
        }
        document.getElementById('recaptchaToken').value = token;
    });
</script>
{{end}}
