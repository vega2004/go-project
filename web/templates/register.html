{{define "content"}}
<div class="flex justify-center items-center min-h-[calc(100vh-200px)]">
    <div class="w-full max-w-2xl">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            <div class="bg-primary-600 text-white text-center py-4">
                <h4 class="text-xl font-bold">
                    <i class="bi bi-person-plus mr-2"></i> Registro de Usuario
                </h4>
            </div>
            <div class="p-6">
                <form method="POST" action="/do-register" id="registerForm">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    
                    <div class="flex flex-col md:flex-row gap-4 mb-4">
                        <div class="flex-1">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" name="name" class="form-input" required minlength="2">
                        </div>
                        <div class="flex-1">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="email" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="flex flex-col md:flex-row gap-4 mb-4">
                        <div class="flex-1">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" name="phone" class="form-input">
                        </div>
                        <div class="flex-1">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-input" required minlength="6">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Confirmar Contraseña</label>
                        <input type="password" name="confirm_password" class="form-input" required>
                    </div>
                    
                    <div class="mb-4">
                        <div class="g-recaptcha flex justify-center" data-sitekey="{{.RecaptchaKey}}"></div>
                        <input type="hidden" name="recaptchaToken" id="recaptchaToken">
                    </div>
                    
                    <button type="submit" class="btn-primary w-full">
                        <i class="bi bi-check-circle"></i> Registrarse
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="/login" class="text-sm text-gray-500 hover:text-primary-600 transition">
                        ¿Ya tienes cuenta? Inicia sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = document.querySelector('[name="password"]').value;
        const confirm = document.querySelector('[name="confirm_password"]').value;
        
        if (password !== confirm) {
            e.preventDefault();
            Swal.fire('Error', 'Las contraseñas no coinciden', 'error');
            return;
        }
        
        const token = grecaptcha.getResponse();
        if (!token) {
            e.preventDefault();
            Swal.fire('Error', 'Por favor, completa el reCAPTCHA', 'error');
            return;
        }
        document.getElementById('recaptchaToken').value = token;
    });
</script>
{{end}}
