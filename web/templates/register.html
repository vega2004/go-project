<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Gestión</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <!-- ========== NAVBAR ========== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-grid-fill"></i> Sistema de Gestión
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Iniciar Sesión</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/register">Registrarse</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ========== CONTENIDO PRINCIPAL ========== -->
    <main class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0"><i class="bi bi-person-plus"></i> Registro de Usuario</h4>
                    </div>
                    <div class="card-body p-4">
                        {{if .Error}}
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> {{.Error}}
                        </div>
                        {{end}}

                        <form method="POST" action="/do-register" id="registerForm">
                            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre completo</label>
                                    <input type="text" name="name" class="form-control" value="{{.Form.Name}}" required minlength="2">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Correo Electrónico</label>
                                    <input type="email" name="email" class="form-control" value="{{.Form.Email}}" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Teléfono</label>
                                    <input type="tel" name="phone" class="form-control" value="{{.Form.Phone}}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Contraseña</label>
                                    <input type="password" name="password" class="form-control" required minlength="6">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Confirmar Contraseña</label>
                                <input type="password" name="confirm_password" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <div class="g-recaptcha" data-sitekey="{{.RecaptchaKey}}"></div>
                                <input type="hidden" name="recaptchaToken" id="recaptchaToken">
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-check-circle"></i> Registrarse
                            </button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="/login" class="text-muted">¿Ya tienes cuenta? Inicia sesión</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="footer mt-5 py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">&copy; {{.CurrentYear}} Sistema de Gestión. Todos los derechos reservados.</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = document.querySelector('[name="password"]').value;
            const confirm = document.querySelector('[name="confirm_password"]').value;
            
            if (password !== confirm) {
                e.preventDefault();
                Swal.fire('Error', 'Las contraseñas no coinciden', 'error');
                return;
            }
            
            const token = grecaptcha.getResponse();
            if (!token) {
                e.preventDefault();
                Swal.fire('Error', 'Por favor, completa el reCAPTCHA', 'error');
                return;
            }
            document.getElementById('recaptchaToken').value = token;
        });
    </script>
</body>
</html>
