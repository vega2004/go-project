<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión · Sistema de Gestión</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- reCAPTCHA API -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #152931 0%, #376474 50%, #4F7785 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Fondo con patrón sutil */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/></svg>');
            opacity: 0.5;
            pointer-events: none;
        }
        
        .login-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        
        .card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            background: #ffffff;
        }
        
        .card-header {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            border: none;
            padding: 35px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .company-logo {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.15);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .company-logo i {
            font-size: 36px;
            color: white;
        }
        
        .card-header h3 {
            margin: 0 0 5px 0;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.5px;
            color: white;
            position: relative;
        }
        
        .card-header p {
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            position: relative;
        }
        
        .card-body {
            padding: 40px 35px;
        }
        
        .form-label {
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        
        .form-control {
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            transition: all 0.2s ease;
            background: #f8fafc;
        }
        
        .form-control:focus {
            border-color: #2c5364;
            box-shadow: 0 0 0 4px rgba(44, 83, 100, 0.1);
            background: white;
        }
        
        .input-group-text {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-right: none;
            border-radius: 14px 0 0 14px;
            color: #2c5364;
        }
        
        .input-group .form-control {
            border-left: none;
            border-radius: 0 14px 14px 0;
        }
        
        .input-group .btn-outline-secondary {
            border: 1.5px solid #e2e8f0;
            border-left: none;
            border-radius: 0 14px 14px 0;
            background: #f8fafc;
            color: #64748b;
            padding: 0 16px;
        }
        
        .input-group .btn-outline-secondary:hover {
            background: #e2e8f0;
            color: #1a202c;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-login:hover {
            background: linear-gradient(135deg, #1a3a4a 0%, #2a4a5a 50%, #3a6a7a 100%);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(44, 83, 100, 0.4);
            color: white;
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .recaptcha-container {
            display: flex;
            justify-content: center;
            margin: 25px 0 15px;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
        }
        
        .footer-text i {
            margin: 0 3px;
        }
        
        .alert {
            border-radius: 14px;
            border: none;
            font-weight: 500;
            padding: 14px 18px;
        }
        
        .alert-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .alert-danger {
            background: linear-gradient(135deg, #cb2d3e 0%, #ef473a 100%);
            color: white;
        }
        
        .alert .btn-close {
            filter: brightness(0) invert(1);
        }
        
        .copyright {
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        /* Animación de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card {
            animation: fadeInUp 0.7s ease-out;
        }
        
        /* Responsive */
        @media (max-width: 576px) {
            .card-body {
                padding: 30px 20px;
            }
            
            .card-header {
                padding: 25px 20px;
            }
            
            .card-header h3 {
                font-size: 24px;
            }
            
            .company-logo {
                width: 60px;
                height: 60px;
            }
            
            .company-logo i {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="card">
            <div class="card-header">
                <div class="company-logo">
                    <i class="bi bi-building"></i>
                </div>
                <h3>Portal Corporativo</h3>
                <p class="mb-0">Acceso Seguro a la Plataforma</p>
            </div>
            
            <div class="card-body">
                <!-- Mensajes Flash -->
                {{if .Error}}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-shield-exclamation me-2"></i> {{.Error}}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {{end}}

                {{if .Success}}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> {{.Success}}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {{end}}

                <form method="POST" action="/do-login" id="loginForm" autocomplete="off">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-envelope-fill me-1"></i> Correo Electrónico
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input type="email" 
                                   name="email" 
                                   class="form-control" 
                                   placeholder="usuario@empresa.com" 
                                   required 
                                   autocomplete="off"
                                   maxlength="100">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-key-fill me-1"></i> Contraseña
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" 
                                   name="password" 
                                   class="form-control" 
                                   id="passwordInput"
                                   placeholder="••••••••" 
                                   required 
                                   autocomplete="off"
                                   minlength="6">
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="bi bi-eye-fill" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- reCAPTCHA -->
                    <div class="recaptcha-container">
                        <div class="g-recaptcha" data-sitekey="{{.RecaptchaKey}}" data-theme="light"></div>
                    </div>
                    <input type="hidden" name="recaptchaToken" id="recaptchaToken">
                    
                    <button type="submit" class="btn btn-login w-100" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        <span>Iniciar Sesión</span>
                        <span class="spinner-border spinner-border-sm ms-2 d-none" role="status" id="loginSpinner"></span>
                    </button>
                </form>
                
                <div class="footer-text">
                    <i class="bi bi-shield-check-fill"></i> 
                    Conexión Segura SSL/TLS
                    <i class="bi bi-shield-check-fill"></i>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4 copyright">
            <i class="bi bi-c-circle me-1"></i> 
            {{.CurrentYear}} Sistema de Gestión Empresarial. Todos los derechos reservados.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // ✅ Toggle para mostrar/ocultar contraseña
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        const toggleIcon = document.getElementById('toggleIcon');
        
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                toggleIcon.classList.remove('bi-eye-fill');
                toggleIcon.classList.add('bi-eye-slash-fill');
            } else {
                toggleIcon.classList.remove('bi-eye-slash-fill');
                toggleIcon.classList.add('bi-eye-fill');
            }
        });
        
        // Validación del formulario con reCAPTCHA (DESACTIVADO PARA PRUEBAS)
// Validación del formulario con reCAPTCHA
document.getElementById('loginForm').addEventListener('submit', function(e) {
    const token = grecaptcha.getResponse();
    const loginBtn = document.getElementById('loginBtn');
    const btnText = loginBtn.querySelector('span:first-of-type');
    const spinner = document.getElementById('loginSpinner');
    
    if (!token) {
        e.preventDefault();
        Swal.fire({
            icon: 'warning',
            title: 'Verificación requerida',
            text: 'Por favor, completa el reCAPTCHA para continuar',
            confirmButtonColor: '#2c5364'
        });
        return false;
    }
    
    // Validar email
    const email = document.querySelector('[name="email"]').value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        e.preventDefault();
        Swal.fire({
            icon: 'error',
            title: 'Correo inválido',
            text: 'Por favor, ingresa un correo electrónico válido',
            confirmButtonColor: '#2c5364'
        });
        return false;
    }
    
    // Validar contraseña
    const password = document.querySelector('[name="password"]').value;
    if (password.length < 6) {
        e.preventDefault();
        Swal.fire({
            icon: 'error',
            title: 'Contraseña inválida',
            text: 'La contraseña debe tener al menos 6 caracteres',
            confirmButtonColor: '#2c5364'
        });
        return false;
    }
    
    // Mostrar loading
    document.getElementById('recaptchaToken').value = token;
    btnText.textContent = 'Verificando...';
    spinner.classList.remove('d-none');
    loginBtn.disabled = true;
});
        
        // Prevenir envío múltiple
        let formSubmitted = false;
        document.getElementById('loginForm').addEventListener('submit', function() {
            if (formSubmitted) return false;
            formSubmitted = true;
        });
        
        // Auto-cerrar alertas después de 5 segundos
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(function(alert) {
                var bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
</body>
</html>
