<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Migajas de pan -->
    <nav aria-label="breadcrumb" class="container mt-3">
        <ol class="breadcrumb">
            {{range .breadcrumbs}}
            <li class="breadcrumb-item">
                {{if .url}}
                <a href="{{.url}}">{{.name}}</a>
                {{else}}
                {{.name}}
                {{end}}
            </li>
            {{end}}
        </ol>
    </nav>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="mb-4">Registro de Usuario</h2>
                
                {{if .Error}}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Error:</strong> {{.Error}}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {{end}}
                
                <div class="card">
                    <div class="card-body">
                        <form method="POST" action="/submit" id="userForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">
                                    <i class="bi bi-person"></i> Nombre completo *
                                </label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       required minlength="2" maxlength="50"
                                       placeholder="Ej: Juan Pérez">
                                <div class="form-text">
                                    <small>Solo letras y espacios (2-50 caracteres)</small>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="bi bi-envelope"></i> Email *
                                </label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       required placeholder="Ej: usuario@dominio.com">
                                <div class="form-text">
                                    <small>Debe ser un email válido</small>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="phone" class="form-label">
                                    <i class="bi bi-telephone"></i> Teléfono *
                                </label>
                                <input type="tel" class="form-control" id="phone" name="phone" 
                                       required placeholder="Ej: +34 600 123 456">
                                <div class="form-text">
                                    <small>Solo números, +, - y espacios (8-15 caracteres)</small>
                                </div>
                            </div>
                            
                            <!-- reCAPTCHA -->
                            <div class="mb-4">
                                <div class="g-recaptcha" data-sitekey="{{.RecaptchaKey}}"></div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/" class="btn btn-secondary me-md-2">
                                    <i class="bi bi-arrow-left"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    <i class="bi bi-check-circle"></i> Registrar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <script>
    document.getElementById('userForm').addEventListener('submit', function(e) {
        const recaptchaResponse = grecaptcha.getResponse();
        
        if (!recaptchaResponse) {
            e.preventDefault();
            alert('Por favor, complete la verificación reCAPTCHA');
            return false;
        }
        
        // Deshabilitar botón para evitar múltiples envíos
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerHTML = 
            '<i class="bi bi-hourglass-split"></i> Procesando...';
        
        return true;
    });
    </script>
</body>
</html>
