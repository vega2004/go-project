<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Sistema de Gestión</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">
                            <i class="bi bi-box-arrow-in-right"></i> 
                            {{.Title}}
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <!-- Mensajes de error/éxito -->
                        {{if .Error}}
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> {{.Error}}
                        </div>
                        {{end}}
                        
                        {{if .Success}}
                        <div class="alert alert-success">
                            <i class="bi bi-check-circle"></i> {{.Success}}
                        </div>
                        {{end}}

                        <!-- Formulario de login - YA CON ID -->
                        <form method="POST" action="/do-login" id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" name="email" value="{{.Email}}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>

                            <!-- reCAPTCHA -->
                            <div class="mb-3">
                                <div class="g-recaptcha" data-sitekey="{{.RecaptchaKey}}"></div>
                                <input type="hidden" name="recaptchaToken" id="recaptchaToken">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                            </button>
                        </form>

                        <!-- Enlace a registro -->
                        <div class="mt-3 text-center">
                            <a href="/register">¿No tienes cuenta? Regístrate</a>
                        </div>
                    </div>
                </div>
                
                <!-- Footer -->
                <div class="text-center mt-3 text-muted">
                    <small>Sistema protegido con reCAPTCHA</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <script>
        // ✅ AHORA SÍ encuentra el formulario por su ID
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const recaptchaResponse = grecaptcha.getResponse();
            if (!recaptchaResponse) {
                e.preventDefault();
                alert('Por favor, complete la verificación reCAPTCHA');
                return;
            }
            document.getElementById('recaptchaToken').value = recaptchaResponse;
        });
    </script>
</body>
</html>
