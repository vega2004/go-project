<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Admin</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <!-- Navbar simplificada -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-grid-fill"></i> Sistema de Gestión
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/dashboard">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Breadcrumbs -->
    <div class="container mt-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-light p-2 rounded">
                {{range .breadcrumbs}}
                <li class="breadcrumb-item">
                    {{if .url}}
                    <a href="{{.url}}">{{.name}}</a>
                    {{else}}
                    {{.name}}
                    {{end}}
                </li>
                {{end}}
            </ol>
        </nav>
    </div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-person-plus"></i> {{.Title}}</h4>
                    </div>
                    <div class="card-body">
                        {{if .Error}}
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> {{.Error}}
                        </div>
                        {{end}}
                        
                        <form method="POST" action="/admin/users/{{if .User}}update/{{.User.ID}}{{else}}create{{end}}">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre *</label>
                                    <input type="text" name="name" class="form-control" value="{{.User.Name}}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email *</label>
                                    <input type="email" name="email" class="form-control" value="{{.User.Email}}" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Teléfono</label>
                                    <input type="text" name="phone" class="form-control" value="{{.User.Phone}}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Rol</label>
                                    <select name="role_id" class="form-select">
                                        <option value="2" {{if eq .User.RoleID 2}}selected{{end}}>Usuario</option>
                                        <option value="1" {{if eq .User.RoleID 1}}selected{{end}}>Administrador</option>
                                        <option value="3" {{if eq .User.RoleID 3}}selected{{end}}>Editor</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Contraseña 
                                    {{if .User}}
                                        <small class="text-muted">(dejar en blanco para no cambiar)</small>
                                    {{end}}
                                </label>
                                <input type="password" name="password" class="form-control" {{if not .User}}required{{end}}>
                                <small class="text-muted">Mínimo 6 caracteres</small>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a href="/admin/users" class="btn btn-secondary">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle"></i> Guardar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
