<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{.Code}} - {{.Title}}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <!-- Breadcrumbs (simplificados) -->
    {{if .breadcrumbs}}
    <nav aria-label="breadcrumb" class="container mt-3">
        <ol class="breadcrumb bg-white p-2 rounded">
            {{range .breadcrumbs}}
            <li class="breadcrumb-item">
                {{if .url}}<a href="{{.url}}">{{.name}}</a>{{else}}{{.name}}{{end}}
            </li>
            {{end}}
        </ol>
    </nav>
    {{end}}
    
    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-body p-5 text-center">
                        <!-- Código de error -->
                        <h1 class="display-1 fw-bold text-primary mb-0">{{.Code}}</h1>
                        
                        <!-- Título -->
                        <h2 class="h3 mb-3">{{.Title}}</h2>
                        
                        <!-- Mensaje -->
                        <p class="text-muted mb-4">{{.Message}}</p>
                        
                        <!-- Detalles adicionales (si existen) -->
                        {{if .Details}}
                        <div class="alert alert-info text-start">
                            <i class="bi bi-info-circle"></i> {{.Details}}
                        </div>
                        {{end}}
                        
                        <!-- Botones de acción -->
                        <div class="d-flex justify-content-center gap-2">
                            <a href="/dashboard" class="btn btn-primary">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                            <button onclick="history.back()" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Volver
                            </button>
                        </div>
                        
                        <!-- Metadatos del error -->
                        <div class="mt-4 small text-muted">
                            <i class="bi bi-clock"></i> {{.Timestamp}} 
                            <span class="mx-2">|</span>
                            <i class="bi bi-hash"></i> {{.ErrorID}}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
